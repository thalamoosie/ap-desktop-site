<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <meta
      name="description"
      content="{{ .Description | default .Site.Params.description }}"
    />
    {{ $css := resources.Get "css/main.css" | resources.Minify }}
    <link rel="stylesheet" href="{{ $css.RelPermalink }}" />
  </head>
  <body>
    <div class="desktop">
      <div class="navbar">
        <p>test placeholder goop</p>
        <nav class="nav-container">
          <a href="/">Home</a>
          <a href="">Work</a>
          <a href="">Blog</a>
          <a href="">Contact</a>
        </nav>
      </div>
      <div class="content">
        <div class="inner-window">
          <div class="window-header">
            <p>Document - Notepad.exe</p>
            <div class="window-controls"><p>🗕🗖❌</p></div>
          </div>
          <div class="window-body">
            {{ block "main" . }} {{ end }}
            <h2>I'm in the window</h2>
            <p>hi I'm a hacker</p>
          </div>
        </div>
      </div>
      <div class="taskbar">
        <div class="start-btn"><p>⊞ Stert</p></div>
        <p>Admiral Taskbar</p>
        <div class="system-tray">
          <div class="icon-container">
            <div class="tray-icon">🔊</div>
            <div class="tray-icon">☎️</div>
            <div class="tray-icon">🐵</div>
          </div>
          <div class="sys-clock">11:38 PM</div>
        </div>
      </div>
    </div>
  </body>
</html>
